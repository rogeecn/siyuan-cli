name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Validate manual publish ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Manual publish must run from the default branch ${{ github.event.repository.default_branch }}" >&2
            exit 1
          fi

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          package_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version v$tag_version does not match package.json version $package_version" >&2
            exit 1
          fi

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
